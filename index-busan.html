<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POP-UP LIVE STOCK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: "Pretendard Variable", Pretendard, sans-serif; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-marquee { display: inline-block; padding-left: 100%; animation: marquee 18s linear infinite; }
        @keyframes marquee { 0%{transform:translate(0,0);} 100%{transform:translate(-100%,0);} }
        .opt-badge { font-size:11px; padding:4px 8px; border-radius:6px; font-weight:700; border:1px solid transparent; display:flex; align-items:center; justify-content:space-between; }
        .opt-in  { background:#DCFCE7; color:#166534; border-color:#86EFAC; }
        .opt-out { background:#FEE2E2; color:#991B1B; border-color:#FECACA; text-decoration:line-through; }
        .soldout-overlay { position:absolute; inset:0; background:rgba(255,255,255,0.6); backdrop-filter:blur(2px); z-index:10; display:flex; align-items:center; justify-content:center; border-radius:10px; }
        .spinner { border:2px solid rgba(0,0,0,0.1); border-left-color:#000; border-radius:50%; width:16px; height:16px; animation:spin 1s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#111] h-[100dvh] flex flex-col justify-center items-center">
<div class="w-full max-w-md h-full sm:h-auto sm:max-h-[95vh] flex flex-col sm:border sm:rounded-xl sm:shadow-xl bg-white overflow-hidden">
    <div class="w-full h-full flex flex-col bg-white relative overflow-hidden">
        <div class="p-4 flex items-center justify-between shrink-0 bg-white border-b border-gray-100">
            <div>
                <p class="font-bold text-xl leading-none tracking-tight">POP-UP LIVE STOCK</p>
                <p id="subtitle" class="text-[10px] text-gray-500 font-medium mt-1">Loading...</p>
            </div>
            <span id="last-updated" class="text-[10px] text-gray-400 font-mono">syncing...</span>
        </div>
        <div class="bg-gray-600 text-white px-4 py-2.5 text-xs font-bold overflow-hidden whitespace-nowrap flex items-center gap-2 shrink-0">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shrink-0"></span>
            <div class="animate-marquee">실시간 재고 현황입니다. 붉은색 표시는 품절입니다. 현장 상황에 따라 차이가 있을 수 있습니다.</div>
        </div>
        <div id="product-list" class="flex-1 overflow-y-auto p-4 pb-36 scrollbar-hide space-y-4"></div>
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white/95 backdrop-blur border-t border-gray-100 z-20 flex flex-col gap-2">
            <button onclick="manualRefresh()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm active:scale-[0.98] transition-all">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
            </button>
            <a id="store-link" href="#" target="_blank" class="w-full bg-white border border-gray-200 text-[#111] font-bold py-3.5 rounded-lg flex items-center justify-center gap-2 text-sm active:scale-[0.98] transition-all">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i> 온라인 스토어 방문하기
            </a>
        </div>
    </div>
</div>
<script>
firebase.initializeApp({
    apiKey: "AIzaSyA-Ggw0br9mlCiXUmF8qgn72wegwq3yqoQ",
    authDomain: "popup-stock-busan.firebaseapp.com",
    projectId: "popup-stock-busan",
    storageBucket: "popup-stock-busan.firebasestorage.app",
    messagingSenderId: "499098237372",
    appId: "1:499098237372:web:51a46cc75dea2d635693b9"
});
var auth = firebase.auth();
var db   = firebase.firestore();
var APP_ID = 'mmmm-popup-busan'; // ★ 부산

var DEFAULT_SETTINGS = { location:"신세계 센텀시티 부산 (Shinsegae Centum City Busan)", storeUrl:"https://linefriendssquare.com" };
var products = [];
var unsub = null;

document.addEventListener('DOMContentLoaded', function() {
    lucide.createIcons();
    auth.signInAnonymously().then(function() { loadConfig(); }).catch(console.error);
});

function loadConfig() {
    Promise.all([
        db.doc('artifacts/'+APP_ID+'/public/data/config/settings').get(),
        db.doc('artifacts/'+APP_ID+'/public/data/config/products').get()
    ]).then(function(results) {
        var settings = results[0].exists ? Object.assign({}, DEFAULT_SETTINGS, results[0].data()) : DEFAULT_SETTINGS;
        document.getElementById('subtitle').innerText = settings.location;
        document.getElementById('store-link').href = settings.storeUrl;
        var pSnap = results[1];
        var raw = (pSnap.exists && pSnap.data().list && pSnap.data().list.length) ? pSnap.data().list : [];
        products = raw.map(function(p) {
            return Object.assign({}, p, {
                variants: p.options.map(function(o,i) {
                    return { id:p.id+'_'+i, name:typeof o==='object'?o.name:o, en:typeof o==='object'?(o.en||''):'', status:'IN_STOCK' };
                })
            });
        });
        render();
        listenStock();
    }).catch(console.error);
}

function listenStock() {
    if (unsub) return;
    unsub = db.doc('artifacts/'+APP_ID+'/public/data/inventory/all_stock').onSnapshot(function(snap) {
        if (snap.exists) {
            var d = snap.data();
            products.forEach(function(g) { g.variants.forEach(function(v) { if(d[v.id]!==undefined) v.status=d[v.id]; }); });
        }
        render();
        var t = new Date();
        document.getElementById('last-updated').innerText = 'Live: '+t.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    });
}

function render() {
    document.getElementById('product-list').innerHTML = products.map(function(g) {
        var allOut = g.variants.every(function(v){return v.status==='SOLD_OUT';});
        var opts = g.variants.map(function(v) {
            var out = v.status==='SOLD_OUT';
            return '<div class="opt-badge '+(out?'opt-out':'opt-in')+'">' +
                '<div class="flex items-baseline gap-1"><span>'+v.name+'</span>'+(v.en?'<span class="text-[9px] opacity-60 uppercase font-normal">'+v.en+'</span>':'')+'</div>' +
                '<span class="text-[9px] opacity-80 ml-1 whitespace-nowrap">'+(out?'SOLD OUT':'재고 있음')+'</span>' +
            '</div>';
        }).join('');
        return '<div class="relative bg-white border-2 '+(allOut?'border-gray-200':'border-black/5')+' rounded-xl p-3 shadow-sm overflow-hidden">' +
            (allOut?'<div class="soldout-overlay"><div class="bg-red-600 text-white text-sm font-black px-4 py-2 rounded-full border-2 border-white -rotate-12 shadow-lg">SOLD OUT</div></div>':'') +
            '<div class="flex gap-4">' +
                '<div class="w-24 h-24 shrink-0 rounded-lg bg-gray-50 overflow-hidden border border-black/5">' +
                    '<img src="'+g.image+'" class="w-full h-full object-cover'+(allOut?' grayscale opacity-50':'')+'" loading="lazy">' +
                '</div>' +
                '<div class="flex-1 min-w-0 flex flex-col">' +
                    '<span class="text-[10px] text-gray-400 font-bold tracking-wider">'+g.category+'</span>' +
                    '<h3 class="text-sm font-bold text-gray-900 leading-tight mb-0.5">'+g.name+'</h3>' +
                    '<p class="text-[10px] text-gray-400 leading-tight mb-1 truncate">'+g.engName+'</p>' +
                    '<div class="text-sm font-bold mt-auto">₩'+Number(g.price).toLocaleString()+'</div>' +
                '</div>' +
            '</div>' +
            '<div class="mt-3 grid grid-cols-2 gap-1.5'+(allOut?' opacity-30 grayscale':'')+'">'+opts+'</div>' +
        '</div>';
    }).join('');
    lucide.createIcons();
}

function manualRefresh() { render(); }
</script>
</body>
</html>
